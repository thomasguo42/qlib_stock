qlib_init:
  provider_uri: "/root/.qlib/qlib_data/us_data"
  region: us
  custom_ops:
    - class: IsNull
      module_path: qlib.contrib.ops.high_freq
  exp_manager:
    class: MLflowExpManager
    module_path: qlib.workflow.expm
    kwargs:
      uri: "/workspace/qlib/mlruns"
      default_exp_name: "us_sharadar_weekly_pit_best_excess_stability_cor_events_full_uplus_stable_topk40_dd_v1"

market: &market pit_mrq_large_idx
benchmark: &benchmark AAPL

data_handler_config: &data_handler_config
  start_time: 2016-01-01
  end_time: 2026-01-30
  fit_start_time: 2016-01-01
  fit_end_time: 2020-12-31
  instruments: *market
  freq: day
  infer_processors:
    - class: CSZScoreNorm
      kwargs:
        fields_group: feature
        method: robust
  learn_processors:
    - class: DropnaLabel
    # Convert LABEL0 from raw forward return to benchmark-relative excess return.
    - class: BenchmarkExcessLabel
      module_path: qlib.contrib.data.processor
      kwargs:
        benchmark_pkl: /root/.qlib/qlib_data/us_data/bench_etf_basket.pkl
        label_horizon_days: 10
        label_ref_start_days: 1
        fields_group: label
        benchmark_kind: return
        fill_method: ffill
        drop_missing: true
    - class: CSZScoreNorm
      kwargs:
        fields_group: feature
        method: robust
  # quality filters: price > $5 and 20d avg dollar volume > $10M
  filter_pipe:
    - filter_type: ExpressionDFilter
      rule_expression: "$close > 5"
      filter_start_time: 2016-01-01
      filter_end_time: 2026-01-30
      keep: false
    - filter_type: ExpressionDFilter
      rule_expression: "Mean($close * $volume, 20) > 10000000"
      filter_start_time: 2016-01-01
      filter_end_time: 2026-01-30
      keep: false
  # weekly base label: next 10 trading days return
  # NOTE: learn_processors convert this to ETF-basket excess return.
  label:
    - ["Ref($close, -11)/Ref($close, -1) - 1"]
    - ["LABEL0"]
  pit_fields:
    - assets
    - liabilities
    - equity
    - revenue
    - netinc
    - ebit
    - ebitda
    - cashneq
    - debt
    - fcf
    - capex
    - workingcapital
    - currentratio
    - grossmargin
    - netmargin
    - dps
    - eps
    - epsdil
    - bvps
    - shareswa
    - shareswadil
    - divyield
  extra_fields:
    - "P($$netinc_q) / (P($$equity_q) + 1e-12)"
    - "P($$netinc_q) / (P($$assets_q) + 1e-12)"
    - "P($$ebitda_q) / (P($$revenue_q) + 1e-12)"
    - "P($$fcf_q) / (P($$revenue_q) + 1e-12)"
    - "P($$debt_q) / (P($$assets_q) + 1e-12)"
    - "P($$cashneq_q) / (P($$assets_q) + 1e-12)"
    - "P($$capex_q) / (P($$assets_q) + 1e-12)"
    - "P($$revenue_q) / (P($$assets_q) + 1e-12)"
    - "P($$dps_q) / ($close + 1e-12)"
    - "P($$eps_q) / ($close + 1e-12)"
    - "P($$bvps_q) / ($close + 1e-12)"
    - "P($$fcf_q) / (P($$shareswa_q) + 1e-12) / ($close + 1e-12)"
    - "If(IsNull(P($$assets_q)), 1, 0)"
    - "If(IsNull(P($$revenue_q)), 1, 0)"
    - "If(IsNull(P($$netinc_q)), 1, 0)"
    - "If(IsNull(P($$equity_q)), 1, 0)"
    - "If(IsNull(P($$debt_q)), 1, 0)"
    - "If(IsNull(P($$cashneq_q)), 1, 0)"
    - "If(IsNull(P($$fcf_q)), 1, 0)"
    - "If(IsNull(P($$capex_q)), 1, 0)"
    - "$insider_transactionshares_63d_sum"
    - "$insider_transactionvalue_63d_sum"
    - "$insider_count_63d_sum"
    - "$insider_sharesownedfollowingtransaction_63d_mean"
    - "$inst13f_totalvalue_63d_chg"
    - "$inst13f_percentoftotal_63d_chg"
    - "$inst13f_shrunits_63d_chg"
    - "$inst13f_count_63d_sum"
    - "If(IsNull($insider_transactionvalue_63d_sum), 1, 0)"
    - "If(IsNull($inst13f_totalvalue_63d_chg), 1, 0)"
  extra_names:
    - "ROE_Q"
    - "ROA_Q"
    - "EBITDA_MARGIN_Q"
    - "FCF_MARGIN_Q"
    - "LEVERAGE_Q"
    - "CASH_ASSETS_Q"
    - "CAPEX_ASSETS_Q"
    - "ASSET_TURN_Q"
    - "DIV_YIELD_PX_Q"
    - "EARN_YIELD_Q"
    - "BOOK_PX_Q"
    - "FCF_YIELD_Q"
    - "MISSING_ASSETS_Q"
    - "MISSING_REVENUE_Q"
    - "MISSING_NETINC_Q"
    - "MISSING_EQUITY_Q"
    - "MISSING_DEBT_Q"
    - "MISSING_CASHNEQ_Q"
    - "MISSING_FCF_Q"
    - "MISSING_CAPEX_Q"
    - "INSIDER_SHARES_63D_SUM"
    - "INSIDER_VALUE_63D_SUM"
    - "INSIDER_COUNT_63D_SUM"
    - "INSIDER_OWNED_FOLLOW_63D_MEAN"
    - "INST13F_TOTALVALUE_63D_CHG"
    - "INST13F_PCTOFTOTAL_63D_CHG"
    - "INST13F_SHRUNITS_63D_CHG"
    - "INST13F_COUNT_63D_SUM"
    - "MISSING_INSIDER_VALUE_63D_SUM"
    - "MISSING_INST13F_TOTALVALUE_63D_CHG"
  pit_interval: q

port_analysis_config: &port_analysis_config
  strategy:
    class: WeeklyRiskManagedTopkDropoutStrategy
    module_path: qlib.contrib.strategy
    kwargs:
      topk: 40
      n_drop: 8
      signal: <PRED>
      rebalance_weekday: 0
      hold_thresh: 10
      only_tradable: true
      risk_degree: 0.95
      dynamic_risk: true
      risk_window: 20
      risk_target_ann: 0.17
      risk_floor: 0.10
      risk_ceiling: 0.85
      risk_smoothing: 0.35
      risk_smoothing_up: 0.20
      risk_smoothing_down: 0.50
      max_risk_step_up: 0.08
      max_risk_step_down: 0.20
      candidate_buffer: 3
      drawdown_window: 126
      drawdown_limit: 0.06
      drawdown_penalty: 0.40
      market_index: SPY
      market_trend_window: 63
      market_trend_thresh: -0.04
      market_trend_penalty: 0.70
      market_trend_boost_thresh: 0.06
      market_trend_boost: 1.15
      include_current_positions: true
      market_drawdown_window: 126
      market_drawdown_limit: 0.08
      market_drawdown_penalty: 0.60
      min_history: 40
  backtest:
    start_time: 2022-01-01
    end_time: 2026-01-30
    account: 10000000
    benchmark: *benchmark
    exchange_kwargs:
      limit_threshold: null
      deal_price: close
      open_cost: 0.0005
      close_cost: 0.0015
      min_cost: 5

task:
  model:
    class: LGBModel
    module_path: qlib.contrib.model.gbdt
    kwargs:
      loss: mse
      colsample_bytree: 0.9
      learning_rate: 0.05
      subsample: 0.9
      lambda_l1: 20.0
      lambda_l2: 80.0
      max_depth: 8
      num_leaves: 256
      num_threads: 20
      num_boost_round: 2000
      early_stopping_rounds: 200
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: Alpha158WithPIT
        module_path: qlib.contrib.data.handler_sharadar
        kwargs: *data_handler_config
      segments:
        train: [2016-01-01, 2020-12-31]
        valid: [2021-01-01, 2021-12-31]
        test: [2022-01-01, 2026-01-30]
  record:
    - class: SignalRecord
      module_path: qlib.workflow.record_temp
      kwargs: {}
    - class: PortAnaRecord
      module_path: qlib.workflow.record_temp
      kwargs:
        config: *port_analysis_config
