qlib_init:
  provider_uri: "/root/.qlib/qlib_data/us_data"
  region: us
  exp_manager:
    class: MLflowExpManager
    module_path: qlib.workflow.expm
    kwargs:
      uri: "/workspace/qlib/mlruns"
      default_exp_name: "us_sharadar"

market: &market all
benchmark: &benchmark AAPL

data_handler_config: &data_handler_config
  start_time: 2000-01-01
  end_time: 2026-01-30
  fit_start_time: 2000-01-01
  fit_end_time: 2018-12-31
  instruments: *market

port_analysis_config: &port_analysis_config
  strategy:
    class: TopkDropoutStrategy
    module_path: qlib.contrib.strategy
    kwargs:
      topk: 50
      n_drop: 5
      signal: <PRED>
  backtest:
    start_time: 2022-01-01
    end_time: 2026-01-30
    account: 10000000
    benchmark: *benchmark
    exchange_kwargs:
      limit_threshold: null
      deal_price: close
      open_cost: 0.0005
      close_cost: 0.0015
      min_cost: 5

task:
  model:
    class: LGBModel
    module_path: qlib.contrib.model.gbdt
    kwargs:
      loss: mse
      colsample_bytree: 0.9
      learning_rate: 0.05
      subsample: 0.9
      lambda_l1: 1.0
      lambda_l2: 1.0
      max_depth: 8
      num_leaves: 128
      num_threads: 20
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: Alpha158
        module_path: qlib.contrib.data.handler
        kwargs: *data_handler_config
      segments:
        train: [2000-01-01, 2018-12-31]
        valid: [2019-01-01, 2021-12-31]
        test: [2022-01-01, 2026-01-30]
  record:
    - class: SignalRecord
      module_path: qlib.workflow.record_temp
      kwargs: {}
    - class: PortAnaRecord
      module_path: qlib.workflow.record_temp
      kwargs:
        config: *port_analysis_config
