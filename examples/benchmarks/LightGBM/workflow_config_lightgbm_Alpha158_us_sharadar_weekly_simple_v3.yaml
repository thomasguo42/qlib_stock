qlib_init:
  provider_uri: "/root/.qlib/qlib_data/us_data"
  region: us
  exp_manager:
    class: MLflowExpManager
    module_path: qlib.workflow.expm
    kwargs:
      uri: "/workspace/qlib/mlruns"
      default_exp_name: "us_sharadar_weekly_simple_v3"

market: &market pit_mrq_large
benchmark: &benchmark AAPL

data_handler_config: &data_handler_config
  start_time: 2000-01-01
  end_time: 2026-01-30
  fit_start_time: 2000-01-01
  fit_end_time: 2018-12-31
  instruments: *market
  freq: day
  infer_processors:
    - class: CSZScoreNorm
      kwargs:
        fields_group: feature
        method: robust
  learn_processors:
    - class: DropnaLabel
    - class: CSRankNorm
      kwargs:
        fields_group: label
    - class: CSZScoreNorm
      kwargs:
        fields_group: feature
        method: robust
  # quality filters: price > $5 and 20d avg dollar volume > $10M
  filter_pipe:
    - filter_type: ExpressionDFilter
      rule_expression: "$close > 5"
      filter_start_time: 2000-01-01
      filter_end_time: 2026-01-30
      keep: false
    - filter_type: ExpressionDFilter
      rule_expression: "Mean($close * $volume, 20) > 10000000"
      filter_start_time: 2000-01-01
      filter_end_time: 2026-01-30
      keep: false
  # weekly label: next 5 trading days return
  label:
    - ["Ref($close, -11)/Ref($close, -1) - 1"]
    - ["LABEL0"]

port_analysis_config: &port_analysis_config
  strategy:
    class: WeeklyTopkDropoutStrategy
    module_path: qlib.contrib.strategy
    kwargs:
      topk: 50
      n_drop: 10
      signal: <PRED>
      rebalance_weekday: 0
      hold_thresh: 5
      only_tradable: true
  backtest:
    start_time: 2022-01-01
    end_time: 2026-01-30
    account: 10000000
    benchmark: *benchmark
    exchange_kwargs:
      limit_threshold: null
      deal_price: close
      open_cost: 0.0005
      close_cost: 0.0015
      min_cost: 5

task:
  model:
    class: LGBModel
    module_path: qlib.contrib.model.gbdt
    kwargs:
      loss: mse
      colsample_bytree: 0.8879
      learning_rate: 0.0421
      subsample: 0.8789
      lambda_l1: 205.6999
      lambda_l2: 580.9768
      max_depth: 8
      num_leaves: 210
      num_threads: 20
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: Alpha158
        module_path: qlib.contrib.data.handler
        kwargs: *data_handler_config
      segments:
        train: [2000-01-01, 2018-12-31]
        valid: [2019-01-01, 2021-12-31]
        test: [2022-01-01, 2026-01-30]
  record:
    - class: SignalRecord
      module_path: qlib.workflow.record_temp
      kwargs: {}
    - class: PortAnaRecord
      module_path: qlib.workflow.record_temp
      kwargs:
        config: *port_analysis_config
